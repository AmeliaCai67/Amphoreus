version: '3'
services:
  ttyd:
    image: tsl0922/ttyd
    command: bash -c "cd /app && source .venv/bin/activate && python main/main.py"
    volumes:
      - .:/app
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd
      - ./nginx/index.html:/usr/share/nginx/html/index.html
    networks:
      - internal
    depends_on:
      - ttyd

networks:
  internal:
