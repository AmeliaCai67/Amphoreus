<!DOCTYPE html>
<html>
<head>
    <title>Amphoreus 系统</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }
        .container { text-align: center; }
        h1 { text-shadow: 0 0 10px #0f0; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        input { 
            background: #000; 
            border: 1px solid #0f0; 
            color: #0f0; 
            padding: 10px; 
            font-family: inherit;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 翁法罗斯 (Amphoreus)</h1>
        <p>永劫回归模拟系统 v1.0</p>
        <p class="blink">_</p>
        <p>请输入密码继续...</p>
        <form action="/" method="get">
            <input type="password" name="pw" placeholder="访问密码" />
            <button type="submit">进入系统</button>
        </form>
        <p style="font-size: 12px; color: #666; margin-top: 50px;">
            警告：本系统涉及多智能体高消耗运算<br>
            仅限授权人员访问
        </p>
    </div>
</body>
</html>
